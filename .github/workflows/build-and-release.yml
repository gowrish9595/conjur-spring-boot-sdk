name: Build and Release JAR

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests)
        run: mvn clean package -DskipTests -B

      - name: Get artifact info
        id: artifact
        run: |
          JAR_FILE=$(ls target/conjur-sdk-springboot-*.jar | grep -v sources | grep -v javadoc | head -1)
          JAR_NAME=$(basename "$JAR_FILE")
          echo "jar_path=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload JAR as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: conjur-sdk-springboot
          path: target/conjur-sdk-springboot-*.jar
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.artifact.outputs.date }}
          name: "SDK Build ${{ steps.artifact.outputs.version }} (${{ steps.artifact.outputs.date }})"
          body: |
            ## Conjur Spring Boot SDK - Auto Build

            **Version:** `${{ steps.artifact.outputs.version }}`
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`

            ### Usage in Maven
            Download the JAR and install to your local repo:
            ```bash
            mvn install:install-file \
              -Dfile=${{ steps.artifact.outputs.jar_name }} \
              -DgroupId=com.cyberark \
              -DartifactId=conjur-sdk-springboot \
              -Dversion=${{ steps.artifact.outputs.version }} \
              -Dpackaging=jar
            ```
          files: |
            ${{ steps.artifact.outputs.jar_path }}
          draft: false
          prerelease: false
